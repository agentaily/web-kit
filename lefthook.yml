# Git hooks via lefthook. Installed automatically on `npm install` (see the
# "prepare" script). Run manually: `npx lefthook run pre-commit`.

pre-commit:
  parallel: false # both jobs touch the git index — keep them sequential
  commands:
    # Format the staged files; re-stage whatever Prettier rewrote.
    format:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs,css,md,json,yml,yaml}"
      run: npx prettier --write {staged_files}
      stage_fixed: true
    # Fast unit gate on source changes.
    test:
      glob: "{src,tests}/**/*.{ts,tsx}"
      run: npm test

pre-push:
  parallel: false # run the cheap gates before the slower build
  commands:
    typecheck:
      run: npm run typecheck
    test:
      run: npm test
    build:
      run: npm run build
